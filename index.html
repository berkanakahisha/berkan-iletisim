<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Berkan Akahısha - İletişim</title>
<meta name="color-scheme" content="dark">
<style>
:root{
  --bg:#0b0f14;
  --card:#121826;
  --txt:#e6edf3;
  --muted:#9aa4b2;
  --border:rgba(255,255,255,.08);
}

*{box-sizing:border-box;}

body{
  margin:0;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:
    radial-gradient(1200px 600px at 20% 10%, #1a2640 0%, var(--bg) 55%);
  color:var(--txt);
}

.card{
  width:min(520px,92vw);
  background:linear-gradient(180deg,#141b2d, var(--card));
  border:1px solid var(--border);
  border-radius:22px;
  padding:26px;
  box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.header{
  text-align:center;
  margin-bottom:20px;
}

.plate-wrap{
  display:flex;
  justify-content:center;
  margin:0 0 16px;
}

.plate{
  display:inline-flex;
  align-items:stretch;
  overflow:hidden;
  border-radius:14px;
  border:2px solid rgba(255,255,255,.28);
  box-shadow:
    0 10px 24px rgba(0,0,0,.22),
    inset 0 0 0 1px rgba(0,0,0,.08);
  background:#f8fafc;
}

.plate-country{
  width:44px;
  background:linear-gradient(180deg,#0057b8,#00479a);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:12px;
  letter-spacing:.6px;
  line-height:1.1;
  padding:8px 4px;
}

.plate-country .star{
  font-size:14px;
  line-height:1;
  margin-bottom:4px;
}

.plate-number{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  min-width:220px;
  color:#111827;
  font-size:28px;
  font-weight:900;
  letter-spacing:2.5px;
  line-height:1;
  background:linear-gradient(180deg,#ffffff,#eef2f7);
  text-shadow:0 1px 0 rgba(255,255,255,.45);
}

h1{
  margin:0 0 6px;
  font-size:24px;
  font-weight:750;
  letter-spacing:.2px;
}

p.subtitle{
  margin:0;
  color:var(--muted);
  font-size:15px;
}

.grid{
  display:grid;
  gap:12px;
  margin-top:22px;
}

a.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-decoration:none;
  color:#fff;
  font-weight:700;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  transition:transform .15s ease, filter .15s ease, box-shadow .15s ease;
  box-shadow:0 8px 20px rgba(0,0,0,.18);
}

a.btn:hover{
  filter:brightness(1.05);
}

a.btn:active{
  transform:translateY(1px);
}

a.btn:focus-visible{
  outline:2px solid #fff;
  outline-offset:3px;
}

.btn-call{
  background:linear-gradient(180deg,#2ea043,#1f7a36);
}

.btn-wa{
  background:linear-gradient(180deg,#25D366,#128C7E);
}

.btn-mail{
  background:linear-gradient(180deg,#7c3aed,#5b21b6);
}

.small{
  margin-top:16px;
  font-size:12px;
  color:var(--muted);
  line-height:1.55;
  text-align:center;
}

@media (max-width:480px){
  .card{padding:22px;}
  .plate-number{
    min-width:auto;
    font-size:24px;
    padding:10px 14px;
    letter-spacing:2px;
  }
  h1{font-size:22px;}
}
</style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="plate-wrap">
        <div class="plate" aria-label="Araç plakası 34 PNZ 746">
          <div class="plate-country">
            <div class="star">★</div>
            <div>TR</div>
          </div>
          <div class="plate-number">34 PNZ 746</div>
        </div>
      </div>

      <h1>Berkan Akahısha</h1>
      <p class="subtitle">Araç sahibi iletişim bilgileri</p>
    </div>

    <div class="grid">
      <a class="btn btn-call" href="tel:+905350444561" aria-label="Ara">📞 Ara</a>
      <a class="btn btn-wa" href="https://wa.me/905350444561?text=Merhaba%20Berkan%2C" aria-label="WhatsApp">💬 WhatsApp'tan yaz</a>
      <a class="btn btn-mail" href="mailto:berkan.akahisha@gmail.com?subject=Merhaba&body=Merhaba%20Berkan%2C" aria-label="Mail">✉️ Mail gönder</a>
    </div>

    <div class="small">
      Araç ile ilgili ulaşım sağlamak için yukarıdaki iletişim yöntemlerinden birini seçebilirsiniz.
    </div>
  </div>
</body>
</html>
